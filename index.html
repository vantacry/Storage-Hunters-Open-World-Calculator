<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storage Hunters: Open World Mutation Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- User inputs: base price, item condition, and grade multiplier. -->
      <div class="inputs">
        <div>
          <label>Custom Value ($)</label
          ><input
            id="base"
            type="number"
            min="0"
            placeholder="Enter custom value"
          />
        </div>
        <div>
          <label>Condition (%)</label
          ><input
            id="condition"
            type="number"
            min="0"
            max="100"
            placeholder="Enter condition"
          />
        </div>
        <div>
          <label>Grade</label
          ><select id="grade">
            <option value="1" data-label="No Grade">No Grade</option>
            <option value="0.55" data-label="Replica">Replica (55%)</option>
            <option value="0.85" data-label="★">★ (85%)</option>
            <option value="1.35" data-label="★★">★★ (135%)</option>
            <option value="2" data-label="★★★">★★★ (200%)</option>
          </select>
        </div>
      </div>
      <!-- Searchable item index loaded live from the Wiki. Clicking an item copies its base value into the calculator. -->
      <section class="item-index" aria-labelledby="itemIndexTitle">
        <div class="index-controls">
          <div class="index-head">
            <div id="itemIndexTitle" class="index-title">Item Index</div>
            <div id="itemSource" class="index-source">
              <span class="live-dot" aria-hidden="true"></span
              ><span>Loading live data...</span>
            </div>
          </div>
          <div class="index-search">
            <label for="itemSearch">Search Items</label
            ><input
              id="itemSearch"
              type="search"
              placeholder="Search by item name"
              autocomplete="off"
            />
          </div>
          <div
            id="areaFilters"
            class="area-filters"
            aria-label="Area filters"
          ></div>
        </div>
        <div id="itemGrid" class="item-grid" aria-live="polite"></div>
      </section>
      <!-- Mutation cards are inserted here automatically by JavaScript. -->
      <div id="mutationArea"></div>
      <!-- Calculation output and quick actions. -->
      <div class="result">
        <div>Selected Item: <b id="selectedItemOut">Custom Value</b></div>
        <div class="multiplier-result-row">
          <span>Mutation Multiplier:</span
          ><span class="result-value-stack"
            ><b id="muti">1x</b
            ><span
              id="activeMultipliers"
              class="active-multipliers"
              aria-live="polite"
            ></span
          ></span>
        </div>
        <div>Condition Factor: <b id="cond">1x</b></div>
        <div>Grade Factor: <b id="gradeOut">1x</b></div>
        <div>Total Multiplier: <b id="total">1x</b></div>
        <div class="big">Final Value:<br /><b id="value">$0.00</b></div>
        <div class="actions">
          <button onclick="resetCalc()" type="button">Reset</button
          ><button id="copyResult" type="button">Copy Result</button>
        </div>
        <div id="copyStatus" class="copy-status" aria-live="polite"></div>
      </div>
      <div class="footer">
        Created by
        <a
          href="https://guns.lol/vantacry"
          target="_blank"
          rel="noopener noreferrer"
          >Vantacry</a
        >
        <span>&bull;</span>
        <a
          href="https://github.com/vantacry/Storage-Hunters-Open-World-Calculator/blob/main/CHANGELOG.md"
          target="_blank"
          rel="noopener noreferrer"
          >v0.3.3</a
        >
        <span>&bull;</span>
        <a
          class="github-link"
          href="https://github.com/vantacry/Storage-Hunters-Open-World-Calculator"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open GitHub repository"
          ><svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              d="M8 0C3.58 0 0 3.67 0 8.2c0 3.62 2.29 6.69 5.47 7.78.4.08.55-.18.55-.4 0-.2-.01-.87-.01-1.58-2.01.38-2.53-.5-2.69-.96-.09-.24-.48-.96-.82-1.15-.28-.16-.68-.55-.01-.56.63-.01 1.08.59 1.23.84.72 1.24 1.87.89 2.33.68.07-.53.28-.89.51-1.09-1.78-.21-3.64-.91-3.64-4.03 0-.89.31-1.62.82-2.19-.08-.21-.36-1.04.08-2.16 0 0 .67-.22 2.2.84.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.06 2.2-.84 2.2-.84.44 1.12.16 1.95.08 2.16.51.57.82 1.3.82 2.19 0 3.13-1.87 3.82-3.65 4.03.29.26.54.75.54 1.52 0 1.09-.01 1.97-.01 2.24 0 .22.15.48.55.4A8.12 8.12 0 0 0 16 8.2C16 3.67 12.42 0 8 0Z"
            /></svg
        ></a>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
